packages:
  - 'bench'
  - 'packages/**'
  - 'sandbox/*'
  - 'sandbox-design-system/**'
  - 'playground'
  - 'website'
  # napi platform packages are published by `napi pre-publish`, not the workspace.
  - '!packages/compiler/npm/**'
  # wasm-pack output dirs get a minimal package.json for CJS/ESM typing; not workspace packages.
  - '!packages/compiler-wasm/pkg-node/**'
  - '!packages/compiler-wasm/pkg-web/**'
