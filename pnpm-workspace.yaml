packages:
  - 'packages/**'
  - 'sandbox/*'
  - 'sandbox/component-lib/**'
  - 'playground'
  - 'website'

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  prisma: true
  sharp: true
  svelte-preprocess: true
  unrs-resolver: true
  core-js: false
  core-js-pure: false
  es5-ext: false
  gatsby: false
  gatsby-cli: false
