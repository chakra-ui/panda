name: Quality

on:
  push:
    branches:
      - main
      - v2
  pull_request:
    branches:
      - main
      - v2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-native:
    name: Build native binding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/composite-actions/install
        with:
          ignore-scripts: 'true'

      - name: Setup Rust
        uses: ./.github/composite-actions/setup-rust
        with:
          cache-key: native

      - name: Build native binding
        run: pnpm --filter @pandacss/compiler build:native

      - name: Upload native binding
        uses: actions/upload-artifact@v7
        with:
          name: compiler-native
          path: |
            packages/compiler/compiler.node
            packages/compiler/binding.cjs
            packages/compiler/native.d.ts
          if-no-files-found: error

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run Prettier
        run: pnpm prettier

  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Run ESLint
        run: pnpm lint
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  tests:
    name: Unit Tests
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Download native binding
        uses: actions/download-artifact@v8
        with:
          name: compiler-native
          path: packages/compiler

      - name: Run tests
        run: pnpm test && pnpm test:codegen

  types:
    name: TypeScript
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/composite-actions/install

      - name: Download native binding
        uses: actions/download-artifact@v8
        with:
          name: compiler-native
          path: packages/compiler

      - name: Run TypeScript type check
        run: pnpm typecheck
