[package]
name = "compiler_wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1"
js-sys = "0.3"
pandacss_config = { workspace = true }
pandacss_encoder = { workspace = true }
pandacss_extractor = { workspace = true, features = ["memory"] }
pandacss_fs = { workspace = true, features = ["memory"] }
pandacss_project = { workspace = true }
pandacss_recipes = { workspace = true }
serde = { workspace = true }
serde-wasm-bindgen = "0.6"
serde_json = { workspace = true }
smallvec = { workspace = true }
tracing = { workspace = true }
wasm-bindgen = "0.2"

[lints]
workspace = true

[package.metadata.wasm-pack.profile.release]
# `--all-features` enables every wasm feature wasm-opt knows about
# (bulk-memory, mutable-globals, sign-ext, simd, …). Required because
# the Rust compiler emits a wide set of post-MVP wasm instructions for
# our deps (oxc_*, fast-glob, etc.) and the wasm-pack-bundled wasm-opt
# rejects them by default.
wasm-opt = ["-Oz", "--all-features"]
